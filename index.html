<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>西西崽测评 | 专业产品评测推荐</title>
<meta name="description" content="西西崽测评 - 为你提供客观、专业、有料的产品评测和推荐">
<style>
:root{--p:#6366f1;--pd:#4f46e5;--bg:#f8fafc;--c:#fff;--b:#e2e8f0;--t:#1e293b;--tl:#64748b;--r:12px;--g:#10b981;--y:#f59e0b;--r2:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);line-height:1.6}
.nav{background:var(--c);border-bottom:1px solid var(--b);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav .logo{font-size:20px;font-weight:800;color:var(--p)}
.nav .logo span{color:var(--t)}
.container{max-width:1000px;margin:0 auto;padding:24px 16px}
.hero{text-align:center;padding:60px 20px 40px}
.hero h1{font-size:36px;font-weight:800;margin-bottom:12px;background:linear-gradient(135deg,var(--p),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:16px;color:var(--tl);max-width:600px;margin:0 auto}
.section-title{font-size:22px;font-weight:700;margin:40px 0 16px;display:flex;align-items:center;gap:8px}
.section-title::before{content:"";width:4px;height:24px;background:var(--p);border-radius:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.card{background:var(--c);border-radius:var(--r);padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:.2s;border:1px solid var(--b)}
.card:hover{box-shadow:0 8px 24px rgba(99,102,241,.12);transform:translateY(-2px)}
.card .badge{display:inline-block;font-size:11px;padding:2px 10px;border-radius:10px;margin-bottom:8px}
.badge-hot{background:#fef3c7;color:#92400e}
.badge-new{background:#dbeafe;color:#1e40af}
.badge-top{background:#d1fae5;color:#065f46}
.card h3{font-size:17px;font-weight:700;margin-bottom:6px}
.card .desc{font-size:13px;color:var(--tl);margin-bottom:12px}
.card .meta{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.card .score{font-size:20px;font-weight:800;color:var(--p)}
.card .score small{font-size:12px;color:var(--tl);font-weight:400}
.footer{text-align:center;padding:40px 20px;color:var(--tl);font-size:13px;border-top:1px solid var(--b);margin-top:40px}
.coming{text-align:center;padding:80px 20px}
.coming .emoji{font-size:64px;margin-bottom:16px}
.coming h2{font-size:24px;font-weight:700;margin-bottom:8px}
.coming p{color:var(--tl);font-size:15px}
</style>
</head>
<body>
<nav class="nav">
<div class="logo">西西崽 <span>· 测评</span></div>
<div style="font-size:13px;color:var(--tl)">专业 · 客观 · 有料</div>
</nav>

<div class="container">
<div class="hero">
<h1>西西崽测评</h1>
<p>为你筛选值得用的产品，每一项测评都基于真实体验和数据分析</p>
</div>

<div class="coming">
<div class="emoji">🔨</div>
<h2>测评内容即将上线</h2>
<p>我们正在准备最硬核的测评内容，敬请期待！</p>
</div>

<div class="footer">
<p>© 2026 xixizai.com · 西西崽测评 · 保留所有权利</p>
</div>
</div>
</body>
</html>
